---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            k8s/**/*
            .github/workflows/flate.yaml

  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # renovate: datasource=github-tags depName=home-operations/flate versioning=semver
      FLATE_VERSION: 0.1.28
    strategy:
      matrix:
        resource:
          - helmrelease
          - kustomization
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout Flate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: home-operations/flate
          ref: ${{ env.FLATE_VERSION }}
          path: .tools/flate
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .tools/flate/go.mod
          cache: true
          cache-dependency-path: .tools/flate/go.sum

      - name: Build Flate
        working-directory: .tools/flate
        run: |-
          mkdir -p "${GITHUB_WORKSPACE}/.tools/bin"
          go build -trimpath -o "${GITHUB_WORKSPACE}/.tools/bin/flate" ./cmd/flate

      - name: Setup Flate
        run: |-
          echo "${GITHUB_WORKSPACE}/.tools/bin" >> "$GITHUB_PATH"
          "${GITHUB_WORKSPACE}/.tools/bin/flate" --version

      - name: Run Flate
        id: flate
        env:
          FLATE_ALLOW_MISSING_SECRETS: "true"
          FLATE_PATH: ./k8s/flux/config
        run: |-
          set -o pipefail

          flate diff ${{ matrix.resource }} | tee diff.patch

          if [ "$(wc -c < diff.patch)" -gt 10000 ]; then
            {
              head -c 10000 diff.patch
              echo
              echo
              echo "... diff truncated; see workflow logs for full output ..."
            } > diff-comment.patch
          else
            cp diff.patch diff-comment.patch
          fi

          {
            echo 'diff<<EOF'
            cat diff-comment.patch
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - if: ${{ steps.flate.outputs.diff != '' }}
        name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - if: ${{ steps.flate.outputs.diff != '' }}
        name: Add Comment
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11.0
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          message-id: ${{ github.event.pull_request.number }}/k8s/${{ matrix.resource }}
          message: |-
            ```diff
            ${{ steps.flate.outputs.diff }}
            ```

  success:
    if: ${{ !cancelled() }}
    needs: flate
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
