---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: irqbalance
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: irqbalance
      app.kubernetes.io/instance: irqbalance
  template:
    metadata:
      labels:
        app.kubernetes.io/name: irqbalance
        app.kubernetes.io/instance: irqbalance
    spec:
      hostIPC: true
      hostPID: true
      nodeSelector:
        feature.node.kubernetes.io/cpu-model.vendor_id: Intel
        feature.node.kubernetes.io/cpu-model.family: "6"
        feature.node.kubernetes.io/cpu-model.id: "154"
      initContainers:
        - name: set-coalescing
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              apk add --no-cache ethtool iproute2
              for dev in enp1s0f0np0 enp1s0f1np1; do
                [ -e "/sys/class/net/${dev}" ] || continue
                ethtool -C "${dev}" adaptive-rx on adaptive-tx on rx-usecs 16 tx-usecs 16
              done
              if [ -d /sys/class/net/bond0/queues ]; then
                root_handle="$(tc qdisc show dev bond0 | awk '/^qdisc mq / { sub(":", "", $3); print $3; exit }')"
                txq_count="$(find /sys/class/net/bond0/queues -maxdepth 1 -type d -name 'tx-*' | wc -l)"
                if [ -n "${root_handle}" ] && [ "${txq_count}" -gt 0 ]; then
                  i=1
                  while [ "${i}" -le "${txq_count}" ]; do
                    parent="$(printf '%s:%x' "${root_handle}" "${i}")"
                    tc qdisc replace dev bond0 parent "${parent}" fq flow_limit 1000
                    i=$((i + 1))
                  done
                fi
              fi
          securityContext:
            privileged: true
      containers:
        - name: irqbalance
          image: ghcr.io/home-operations/irqbalance:1.9.4@sha256:6cc768c3f074c221412d56b341a19c8432f9a6d76eda0b346285f9c5e2d3b2cc
          env:
            - name: IRQBALANCE_BANNED_CPULIST
              value: "12-19"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 64Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: run
              mountPath: /run/irqbalance
      volumes:
        - name: run
          emptyDir: {}
