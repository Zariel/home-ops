---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - externalsecret.yaml
  - helmrelease.yaml
  - httproute.yaml
  - tcproute.yaml

configMapGenerator:
  - name: forgejo-catppuccin-theme
    files:
      - themes/theme-catppuccin-mocha-lavender.css

generatorOptions:
  disableNameSuffixHash: true
