---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sporos
  annotations:
    reloader.stakater.com/auto: "true"
  labels: &labels
    app.kubernetes.io/component: sporos
    app.kubernetes.io/instance: sporos
    app.kubernetes.io/name: sporos
spec:
  selector:
    matchLabels: *labels
  strategy:
    type: Recreate
  template:
    metadata:
      labels: *labels
    spec:
      priorityClassName: cluster-p1
      containers:
        - name: sporos
          image: ghcr.io/zariel/sporos:latest@sha256:0a1da2f7518c95a2cb4e9d4a8e7feec159080b12fc31787f5d7909a4d1e022dc
          imagePullPolicy: IfNotPresent
          args:
            - serve
          env:
            - name: TZ
              value: Europe/London
            - name: RUST_LOG
              value: warn,sporos=info,sporos::runtime=debug
          envFrom:
            - secretRef:
                name: sporos-secret
          ports:
            - name: http
              containerPort: 2468
          startupProbe:
            failureThreshold: 30
            periodSeconds: 10
            httpGet:
              path: /livez
              port: http
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            httpGet:
              path: /livez
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 10
            httpGet:
              path: /readyz
              port: http
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /app/state
              name: state
            - mountPath: /data
              name: arr-media
            - name: music-downloads
              mountPath: /media/music-downloads
              readOnly: true
            - mountPath: /app/config.toml
              name: config-file
              readOnly: true
              subPath: config.toml
            - mountPath: /tmp
              name: tmp
      enableServiceLinks: false
      initContainers:
        - name: prepare-link-dirs
          image: docker.io/library/busybox:1.38.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - mkdir -p /data/downloads/torrents/complete/cross-seed /data/downloads/torrents/complete/music/cross-seed
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
          volumeMounts:
            - mountPath: /data
              name: arr-media
      restartPolicy: Always
      securityContext:
        fsGroup: 3005
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 568
        runAsNonRoot: true
        runAsUser: 568
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups:
          - 3005
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: sporos
        - name: arr-media
          nfs:
            server: nas.cbannister.casa
            path: /mnt/bighorse/arr
        - name: music-downloads
          nfs:
            server: nas.cbannister.casa
            path: /mnt/bighorse/music/downloads
        - name: config-file
          configMap:
            name: sporos-config
        - name: tmp
          emptyDir: {}
