apiVersion: apps/v1
kind: Deployment
metadata:
  name: cross-seed
  annotations:
    reloader.stakater.com/auto: "true"
  labels: &labels
    app.kubernetes.io/component: cross-seed
    app.kubernetes.io/instance: cross-seed
    app.kubernetes.io/name: cross-seed
spec:
  selector:
    matchLabels: *labels
  strategy:
    type: Recreate
  template:
    metadata:
      labels: *labels
    spec:
      priorityClassName: cluster-p1
      containers:
        - name: cross-seed
          image: ghcr.io/cross-seed/cross-seed:6.13.7@sha256:a1fed512261fd968c55cb03c51cff9c6620aa76a34b3b591afca95c890aa8225
          imagePullPolicy: IfNotPresent
          args:
            - daemon
            - --verbose
          env:
            - name: TZ
              value: Europe/London
            - name: NODE_OPTIONS
              value: "--max-old-space-size=4096"
          ports:
            - name: http
              containerPort: 80
          startupProbe:
            failureThreshold: 300
            initialDelaySeconds: 0
            periodSeconds: 10
            successThreshold: 1
            httpGet:
              path: /api/ping
              port: http
            timeoutSeconds: 10
          livenessProbe:
            initialDelaySeconds: 300
            failureThreshold: 6
            periodSeconds: 10
            successThreshold: 1
            httpGet:
              path: /api/ping
              port: http
            timeoutSeconds: 10
          readinessProbe:
            failureThreshold: 6
            periodSeconds: 10
            successThreshold: 1
            httpGet:
              path: /api/ping
              port: http
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 6Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data
              name: data
            - name: music
              mountPath: /data/downloads/torrents/complete/music
            - mountPath: /config/config.js
              name: secret-file
              readOnly: true
              subPath: config.js
      enableServiceLinks: false
      restartPolicy: Always
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 568
        runAsNonRoot: true
        runAsUser: 568
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups:
          - 10000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: cross-seed
        - name: data
          nfs:
            server: nas.cbannister.casa
            path: /mnt/bighorse/arr
        - name: music
          nfs:
            server: nas.cbannister.casa
            path: /mnt/bighorse/music/downloads
        - name: secret-file
          secret:
            secretName: cross-seed-secret
