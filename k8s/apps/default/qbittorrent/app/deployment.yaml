apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  labels:
    app: qbittorrent
spec:
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      hostname: qbittorrent
      priorityClassName: cluster-p1
      terminationGracePeriodSeconds: 300
      volumes:
        - name: arr-media
          nfs:
            server: nas.cbannister.casa
            path: /mnt/bighorse/arr
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent
        - name: scripts
          configMap:
            name: qbittorrent-scripts
            defaultMode: 0775
        - name: music
          nfs:
            server: nas.cbannister.casa
            path: /mnt/bighorse/music/downloads
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 3005
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [3005]
        seccompProfile: { type: RuntimeDefault }
        sysctls:
          - name: net.ipv4.ip_local_port_range
            value: "1024 65535"
          - name: net.ipv4.tcp_fastopen
            value: "3"
          - name: net.ipv4.tcp_fin_timeout
            value: "15"
          - name: net.ipv4.tcp_notsent_lowat
            value: "131072"
          - name: net.ipv4.tcp_slow_start_after_idle
            value: "0"
          - name: net.ipv4.tcp_tw_reuse
            value: "1"
      containers:
        - name: qbittorrent
          image: ghcr.io/buroa/qbittorrent-brr:5.2.1@sha256:6656e6515f493eea42fcf9b3aa6a5cd76b2722af5cbe0914136d1febcebca687
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/London
            - name: QBT_WEBUI_PORT
              value: "80"
            - name: QBT_TORRENTING_PORT
              value: "50413"
            - name: QBT_Preferences_WebUI_AlternativeUIEnabled
              value: "false"
            - name: QBT_Preferences_WebUI_AuthSubnetWhitelistEnabled
              value: "true"
            - name: QBT_Preferences_WebUI_AuthSubnetWhitelist
              value: |-
                10.0.0.0/8
            - name: QBT_Preferences_WebUI_LocalHostAuth
              value: "false"
            - name: QBT_BitTorrent_Session_DefaultSavePath
              value: /data/torrents/complete
            - name: QBT_BitTorrent_Session_TempPath
              value: /data/torrents/incomplete
          envFrom:
            - secretRef:
                name: qbittorrent-secret
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 80
              name: web
            - containerPort: 50413
              name: bt-tcp
              protocol: TCP
            - containerPort: 50413
              name: bt-udp
              protocol: UDP
          readinessProbe:
            httpGet: &probe
              port: web
              path: /api/v2/app/webapiVersion
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet: *probe
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet: *probe
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20
          resources:
            requests:
              cpu: 2
              memory: 16Gi
            limits:
              memory: 32Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: arr-media
              mountPath: /data
            - name: scripts
              mountPath: /scripts/post-process.sh
              # readOnly: true
              subPath: post-process.sh
            - name: music
              mountPath: /data/downloads/torrents/complete/music
