---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: thelounge
spec:
  podSelector:
    matchLabels:
      app: thelounge
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
          podSelector:
            matchLabels:
              app.kubernetes.io/name: envoy
              app.kubernetes.io/component: proxy
              gateway: internal
      ports:
        - protocol: TCP
          port: web
