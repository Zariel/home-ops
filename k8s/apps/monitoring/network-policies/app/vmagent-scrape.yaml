---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vmagent-scrape
spec:
  podSelector:
    matchLabels:
      networking.cbannister.xyz/allow-vmagent-scrape: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vmagent
              app.kubernetes.io/instance: victoria
      ports:
        - protocol: TCP
          port: http
        - protocol: TCP
          port: metrics
        - protocol: TCP
          port: http-metrics
        - protocol: TCP
          port: https
        - protocol: TCP
          port: prometheus
        - protocol: TCP
          port: hubble-metrics
        - protocol: TCP
          port: envoy-metrics
        - protocol: TCP
          port: tcp-9153
