# yaml-language-server: $schema=https://crds.jank.ing/operator.victoriametrics.com/vmsingle_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: victoria
spec:
  useStrictSecurity: true
  retentionPeriod: "12"
  extraArgs:
    dedup.minScrapeInterval: 30s
    memory.allowedBytes: 3GiB
    maxLabelsPerTimeseries: "100"
    search.cacheTimestampOffset: 15m
    search.maxConcurrentRequests: "4"
    search.maxMemoryPerQuery: 512MiB
    search.minStalenessInterval: 5m
  storage:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 150Gi
    storageClassName: ceph-block
  resources:
    requests:
      cpu: 1
      memory: 6Gi
    limits:
      memory: 6Gi
