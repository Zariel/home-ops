---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ceph-csi-drivers
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.0.1
  url: oci://ghcr.io/home-operations/charts-mirror/ceph-csi-drivers
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: rook-ceph-operator
      namespace: rook-ceph
  values:
    operatorConfig:
      namespace: rook-ceph
      driverSpecDefaults:
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        generateOMapInfo: false
        fsGroupPolicy: File
        cephFsClientType: kernel
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          enableSeLinuxHostMount: false
          imagePullPolicy: IfNotPresent
          priorityClassName: system-node-critical
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          deploymentStrategy:
            type: Recreate
          imagePullPolicy: IfNotPresent
          priorityClassName: system-cluster-critical
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        enabled: true
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        generateOMapInfo: false
        fsGroupPolicy: File
        cephFsClientType: kernel
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          enableSeLinuxHostMount: false
          imagePullPolicy: IfNotPresent
          priorityClassName: system-node-critical
          updateStrategy:
            type: RollingUpdate
          resources:
            registrar:
              limits:
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 128Mi
            liveness: {}
            addons: {}
            logRotator: {}
            plugin:
              limits:
                memory: 1Gi
              requests:
                cpu: 250m
                memory: 512Mi
        controllerPlugin:
          hostNetwork: true
          replicas: 2
          imagePullPolicy: IfNotPresent
          priorityClassName: system-cluster-critical
          resources:
            attacher:
              limits:
                memory: 256Mi
              requests:
                cpu: 100m
                memory: 128Mi
            snapshotter:
              limits:
                memory: 256Mi
              requests:
                cpu: 100m
                memory: 128Mi
            resizer:
              limits:
                memory: 256Mi
              requests:
                cpu: 100m
                memory: 128Mi
            provisioner:
              limits:
                memory: 256Mi
              requests:
                cpu: 100m
                memory: 128Mi
            omapGenerator:
              limits:
                memory: 1Gi
              requests:
                cpu: 250m
                memory: 512Mi
            liveness: {}
            addons: {}
            logRotator: {}
            plugin:
              limits:
                memory: 1Gi
              requests:
                memory: 512Mi
      cephfs:
        enabled: false
      nfs:
        enabled: false
      nvmeof:
        enabled: false
