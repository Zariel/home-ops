---
groups:
  - name: rook-ceph-cluster
    rules:
      - alert: CephClusterFailedReconcile
        expr: |
          count_over_time({app="rook-ceph-operator"}[$__auto] |= "failed to reconcile CephCluster") > 0
        for: 5m
        annotations:
          summary: >-
            CephCluster has not reconciled
        labels:
          severity: critical
