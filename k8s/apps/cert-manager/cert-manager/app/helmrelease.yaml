---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: v1.20.2
  url: oci://quay.io/jetstack/charts/cert-manager
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cert-manager
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: cert-manager
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: cert-manager
              spec:
                template:
                  metadata:
                    labels:
                      networking.cbannister.xyz/allow-vmagent-scrape: "true"
          - target:
              kind: Deployment
              name: cert-manager-cainjector
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: cert-manager-cainjector
              spec:
                template:
                  metadata:
                    labels:
                      networking.cbannister.xyz/allow-vmagent-scrape: "true"
  values:
    replicaCount: 2
    crds:
      enabled: true
    dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://1.0.0.1:443/dns-query
    dns01RecursiveNameserversOnly: true
    resources:
      requests:
        memory: 160Mi
      limits:
        memory: 160Mi
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        prometheusInstance: monitoring
    webhook:
      replicaCount: 2
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 128Mi
    cainjector:
      replicaCount: 2
      resources:
        requests:
          memory: 160Mi
        limits:
          memory: 160Mi
