---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/tuppr.home-operations.com/kubernetesupgrade_v1alpha1.json
apiVersion: tuppr.home-operations.com/v1alpha1
kind: KubernetesUpgrade
metadata:
  name: kubernetes
spec:
  kubernetes:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
    version: v1.36.2
  healthChecks:
    - apiVersion: v1
      kind: Pod
      name: kube-apiserver-k8s-0
      namespace: kube-system
      description: Kubernetes API server is healthy on k8s-0
      expr: &controlPlanePodHealthy |-
        status.phase == "Running" &&
        status.conditions.exists(c, c.type == "Ready" && c.status == "True") &&
        status.containerStatuses.all(c, c.ready == true)
    - apiVersion: v1
      kind: Pod
      name: kube-apiserver-k8s-1
      namespace: kube-system
      description: Kubernetes API server is healthy on k8s-1
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-apiserver-k8s-2
      namespace: kube-system
      description: Kubernetes API server is healthy on k8s-2
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-controller-manager-k8s-0
      namespace: kube-system
      description: Kubernetes controller manager is healthy on k8s-0
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-controller-manager-k8s-1
      namespace: kube-system
      description: Kubernetes controller manager is healthy on k8s-1
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-controller-manager-k8s-2
      namespace: kube-system
      description: Kubernetes controller manager is healthy on k8s-2
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-scheduler-k8s-0
      namespace: kube-system
      description: Kubernetes scheduler is healthy on k8s-0
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-scheduler-k8s-1
      namespace: kube-system
      description: Kubernetes scheduler is healthy on k8s-1
      expr: *controlPlanePodHealthy
    - apiVersion: v1
      kind: Pod
      name: kube-scheduler-k8s-2
      namespace: kube-system
      description: Kubernetes scheduler is healthy on k8s-2
      expr: *controlPlanePodHealthy
    - apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      expr: |-
        status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      expr: |-
        status.ceph.health in ['HEALTH_OK']
